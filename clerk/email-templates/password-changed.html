<!DOCTYPE html>
<!-- Backlog: thông báo đổi mật khẩu — bật template "Password changed" trên Clerk khi triển khai phiên bản sau. -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mật khẩu đã đổi — {{app.name}}</title>
</head>
<body style="margin:0;padding:0;background-color:#F0F5F1;font-family:'Segoe UI',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F0F5F1;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

          <tr>
            <td align="center" style="padding-bottom:28px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#2E7D32 0%,#43A047 100%);border-radius:20px;padding:18px 28px;text-align:center;">
                    <div style="font-size:32px;margin-bottom:4px;">🌿</div>
                    <div style="font-size:22px;font-weight:800;color:#ffffff;">{{{app.name}}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(46,125,50,0.10);">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr><td style="background:linear-gradient(90deg,#2E7D32,#66BB6A,#FF9800);height:5px;"></td></tr>
              </table>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:40px 36px 36px;">
                    <div style="text-align:center;font-size:40px;margin-bottom:16px;">✅</div>
                    <h1 style="margin:0 0 12px;font-size:24px;font-weight:800;color:#1B5E20;text-align:center;">
                      Mật khẩu đã được cập nhật
                    </h1>
                    <p style="margin:0 0 20px;font-size:15px;color:#546E7A;text-align:center;line-height:1.7;">
                      Mật khẩu tài khoản <strong>{{{app.name}}}</strong> của bạn vừa được thay đổi thành công.
                    </p>
                    <p style="margin:0 0 24px;font-size:14px;color:#78909C;text-align:center;">
                      Nếu <strong>không phải bạn</strong> thực hiện, hãy đặt lại mật khẩu ngay và kiểm tra thiết bị của bạn.
                    </p>
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td align="center">
                          <a href="{{action_url}}" style="display:inline-block;background:linear-gradient(135deg,#2E7D32,#43A047);color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;padding:14px 28px;border-radius:50px;">
                            Mở ứng dụng / Bảo mật tài khoản
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:28px 16px;text-align:center;">
              <p style="margin:0;font-size:11px;color:#B0BEC5;">© 2026 {{{app.name}}} · {{app.domain_name}}</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
